name: Get the PR number for the current commit
author: Donal Fellows
description: >
  Given the current commit, determine the PR number associated with it.
  Handles the case when there is no such PR.
outputs:
  pr:
    description: The PR number, or an empty string.
    value: ${{ fromJson(steps.pr-number.outputs.result).number }}
branding:
  color: green
  icon: git-pull-request

runs:
  using: composite
  steps:
    - name: Determine the PR number
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      id: pr-number
      with:
        script: |
          if (context.issue.number) {
            return context.issue;
          }
          return ((
            await github.rest.repos.listPullRequestsAssociatedWithCommit({
              commit_sha: context.sha,
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
          ).data[0] ?? {number: ""});
