name: Enforce License Rules
# Enforces our own license rules.
run-name: License Check
on: push
permissions: {}
jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Enforce
        uses: UoMResearchIT/actions/check-copyrights@d1daa552b595b77a4628d28de138db571e91ab87 # v1.2.5
        with:
          profile: ASL
