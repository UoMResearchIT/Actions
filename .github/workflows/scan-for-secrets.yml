# This reusable workflow is used to scan for secrets; API keys for various
# services that shouldn't be made public but instead ought to be handled
# via the Github Secrets mechanisms.
#
# It needs no elevated permissions, and no access to real secrets.
#
# It uses the file ../secret-scanner/baseline.json (relative to where this
# workflow is) to provide a baseline configuration when the user does not
# specify their own.

name: Scan for Secrets
on:
  workflow_call:
    inputs:
      config-file:
        type: string
        required: false
        default: .github/secret-scanner/baseline.json
        description: >
          The name of secret scanner configuration.
          If not supplied, a default is used.
      exclude-path:
        type: string
        required: false
        default: .github/secret-scanner
        description: >
          A path to the directory of files containing things to exclude.
          Templates for exclusion files are in the directory at
          `.../UoMResearchIT/actions/.github/secret-scanner`.

jobs:
  check:
    name: Checking for Service API Keys
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
        timeout-minutes: 2
      - name: Checkout default configuration file
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: .uomrit-actions
          sparse-checkout: .github/secret-scanner
          repository: UoMResearchIT/actions
          ref: af043d6d68df41a88dfe8d8f71088f9440dfb6d8  # secret-scanner
          persist-credentials: false
        timeout-minutes: 1
      - name: Select configuration
        id: cfg
        run: |
          echo file=$([ -f "$CFG" ] && echo $CFG || echo $DFLT) >> $GITHUB_OUTPUT
        env:
          CFG: ${{ inputs.config-file }}
          DFLT: .uomrit-actions/.github/secret-scanner/baseline.json
      - name: Scan
        uses: UoMResearchIT/actions/secret-scanner@af043d6d68df41a88dfe8d8f71088f9440dfb6d8  # secret-scanner
        with:
          baseline-file: ${{ steps.cfg.outputs.file }}
          exclude-path: ${{ inputs.exclude-path }}
          additional-args: --exclude-files '.*\.uomrit-actions/.*'
        timeout-minutes: 10
