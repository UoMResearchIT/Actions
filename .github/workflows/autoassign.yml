name: Auto-Assign
run-name: "Assign issue #${{ github.event.issue.id }} to default assignee"
# Automatically assign issues to one of the people registered for that.
on:
  issues:
    types: [opened]
permissions: {}
jobs:
  auto-assign:
    name: Assign Issue to default assignee
    if: vars.DEFAULT_ISSUE_ASSIGNEE != ''
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 'Auto-assign issue'
        uses: pozil/auto-assign-issue@07fe6dc0e9771842b428f5739098d6140734e226
        with:
          abortIfPreviousAssignees: true
          assignees: ${{ vars.DEFAULT_ISSUE_ASSIGNEE }}
