name: Add License and Copyright Headers
on:
  workflow_call:
    inputs:
      ref:
        description: "What reference to check. Defaults to the one from the pull request invoking this."
        type: string
        required: false
        default: ${{ github.event.pull_request.head.sha }}
      work-dir:
        description: "The working directory to check the code out into. Defaults to 'repo'."
        type: string
        required: false
        default: repo
      branch:
        description: "The name of the branch, used when generating a diff."
        type: string
        required: false
        default: ${{ github.head_ref }}
      license:
        description: "The SPDX name of the license to use."
        type: string
        required: false
        default: apache-2.0
      copyright-holder:
        description: "The name of the copyright holder."
        type: string
        required: false
        default: "University of Manchester"
    outputs:
      check-failed:
        description: "Whether the check applied by this workflow 'failed'."
        value: ${{ jobs.add-headers.outputs.made-change == 'true' }}
      branch-created:
        description: "If a branch was created, the name of that branch."
        value: ${{ jobs.add-headers.outputs.made-change == 'true' && jobs.add-headers.outputs.branch || '' }}
      branches-deleted:
        description: "If some branches were delete, what branches were they."
        value: ${{ jobs.add-headers.outputs.deleted }}

permissions: {}

jobs:
  add-headers:
    name: Add Headers
    # Categorically never run this in pull_request_target workflows. UNSAFE TO DO THAT!
    if: github.event_name != 'pull_request_trigger'
    runs-on: ubuntu-latest
    concurrency:
      group: prune:add-license-headers
      cancel-in-progress: false
      queue: max
    outputs:
      made-change: ${{ steps.push.outputs.changed }}
      branch: ${{ steps.push.outputs.branch }}
      deleted: ${{ steps.delete.outputs.deleted_branches }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: ${{ inputs.work-dir }}
          ref: ${{ inputs.ref }}
          persist-credentials: true

      - name: Add copyright headers
        uses: UoMResearchIT/actions/reuse@90b0a79709ec51d5e53ae809801e3dc77a8e6153 # fix-reuse
        with:
          base-dir: ${{ inputs.work-dir }}
          extra-formats-file: ${{ inputs.work-dir }}/.extraformats
          ignore-file: ${{ inputs.work-dir }}/.licenseignore
          license: ${{ inputs.license }}
          copyright-holder: ${{ inputs.copyright-holder }}

      - name: Delete existing fix-headers branches
        uses: phpdocker-io/github-actions-delete-abandoned-branches@e04764c2f0f714dedb80c42d5174e756568a0452 # v2.0.3
        id: delete
        with:
          github_token: ${{ github.token }}
          last_commit_age_days: -1
          allowed_prefixes: add-license-headers-to-${{ inputs.branch }}-
          dry_run: no

      - name: Commit and push changes
        id: push
        uses: UoMResearchIT/actions/git-push-changes-to-branch@d1daa552b595b77a4628d28de138db571e91ab87 # v1.2.5
        with:
          working-directory: ${{ inputs.work-dir }}
          branch-prefix: add-license-headers-to
          commit-message: Add License and Copyright Headers
          exclude: .github/workflows/*

  annotate:
    name: Annotate PR
    runs-on: ubuntu-latest
    concurrency:
      group: prune:bot-comments
      queue: max
      cancel-in-progress: false
    needs: add-headers
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Commit comment
        if: needs.add-headers.outputs.made-change == 'true'
        uses: peter-evans/commit-comment@f6d60c65d05bb59f750fa51ad3de1d443ba0eb52 # v4.0.0
        with:
          body: >
            Copyright updates at [.../compare/${{ inputs.branch }}...${{ needs.add-headers.outputs.branch }}](${{ github.server_url }}/${{ github.repository }}/compare/${{ inputs.branch }}...${{ needs.add-headers.outputs.branch }}?expand=1), please review and merge.

      - name: Hide old PR comments
        if: needs.add-headers.outputs.made-change == 'false'
        uses: kanga333/comment-hider@c12bb20b48aeb8fc098e35967de8d4f8018fffdf # v0.4.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: PR comment
        if: needs.add-headers.outputs.made-change == 'true'
        uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3.11.0
        with:
          refresh-message-position: true
          message: |
            ## Changes were made to copyright notices
            There are copyright updates on the (temporary) [${{ needs.add-headers.outputs.branch }} branch](${{ github.server_url }}/${{ github.repository }}/compare/${{ inputs.branch }}...${{ needs.add-headers.outputs.branch }}?expand=1). Please review and merge, or add further commits (this branch will be deleted).

      - name: Fail marker
        if: needs.add-headers.outputs.made-change == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.setFailed(`Copyright updates at ${process.env.COMPARE_URL}, please review and merge.`)
        env:
          COMPARE_URL: ${{ github.server_url }}/${{ github.repository }}/compare/${{ inputs.branch }}...${{ needs.add-headers.outputs.branch }}?expand=1
