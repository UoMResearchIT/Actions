name: 'REUSE Compliance Check'
description: "Check your project's REUSE compliance for clear and simple licensing and copyright!"
author: 'Free Software Foundation Europe (FSFE), University of Manchester'
inputs:
  args:
    description: "The arguments to pass to the reuse-tool"
    required: false
    default: ""
  branch:
    description: "The branch or tag to check out the reuse-tool from"
    required: false
    default: "main"
  python-version:
    description: "The version of Python to run the reuse-tool in."
    required: false
    default: "3.12"
  poetry-version:
    description: "The version of Poetry to install the reuse-tool with."
    required: false
    default: "1.3.0"
  copyright-holder:
    description: "The name of the copyright holder"
    required: false
    default: "University of Manchester"
  license:
    description: "The name of the license to apply"
    required: false
    default: "apache-2.0"
  merge:
    description: "Whether to merge copyrights"
    required: false
    default: "true"
  fallback-dot-license:
    description: "Whether to create a .license file as a fallback"
    required: false
    default: "true"
  extra-formats-file:
    description: "The name of the extra formats file"
    required: false
    default: ".extraformats"
  ignore-file:
    description: "The name of the ignore file"
    required: false
    default: ".licenseignore"
  base-dir:
    description: "The base directory to analyse and annotate"
    required: false
    default: "."
runs:
  using: composite
  steps:
  - name: Checkout
    uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    with:
      path: reuse-tool
      repository: UoMResearchIT/reuse-tool
      ref: ${{ inputs.branch }}
      persist-credentials: false

  - name: Setup Python
    uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
    id: setup-python
    with:
      python-version: ${{ inputs.python-version }}

  - name: Clear Problem Matcher
    run: echo '::remove-matcher owner=python::'
    shell: bash

  - name: Restore Cache
    uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
    id: cache-venv
    with:
      path: reuse-tool-venv
      key: setup-venv-${{ runner.os }}-py-${{ steps.setup-python.outputs.python-version }}-${{ steps.setup-python.outputs.python-path }}-reuse-${{ inputs.branch }}-${{ hashFiles('reuse-tool/pyproject.toml', 'reuse-tool/src/**/*.py') }}

  - name: Create reuse-tool Environment
    run: python -m venv reuse-tool-venv
    if: steps.cache-venv.outputs.cache-hit != 'true'
    shell: bash

  - name: Enable reuse-tool Environment
    id: venv
    run: |
      source reuse-tool-venv/${SCRIPT_DIR}/activate
      echo "virtual_env=${VIRTUAL_ENV}" >> $GITHUB_OUTPUT
      echo "path=${VIRTUAL_ENV}/${SCRIPT_DIR}" >> $GITHUB_OUTPUT
    shell: bash
    env:
      SCRIPT_DIR: ${{ runner.os == 'Windows' && 'Scripts' || 'bin' }}

  - name: Setup reuse-tool Environment
    run: |
      PATH="$PATH_ELEMENT:$PATH"
      pip install "poetry~=$USE_POETRY_VERSION"
      cd reuse-tool
      poetry install --no-interaction --only main
      poetry build --no-interaction
      pip install dist/*.whl
    if: steps.cache-venv.outputs.cache-hit != 'true'
    shell: bash
    env:
      USE_POETRY_VERSION: ${{ inputs.poetry-version }}
      VIRTUAL_ENV: ${{ steps.venv.outputs.virtual_env }}
      PATH_ELEMENT: ${{ steps.venv.outputs.path }}

  - name: Save Cache
    uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
    with:
      path: reuse-tool-venv
      key: ${{ steps.cache-venv.outputs.cache-primary-key }}
    if: steps.cache-venv.outputs.cache-hit != 'true'

  - name: Set Up Arguments
    id: args
    shell: bash
    env:
      Arguments: ${{ inputs.args }}
      Who: ${{ inputs.copyright-holder }}
      License: ${{ inputs.license }}
      Merge: ${{ inputs.merge }}
      Fallback: ${{ inputs.fallback-dot-license }}
      Extra: ${{ inputs.extra-formats-file }}
      Ignore: ${{ inputs.ignore-file }}
      Dir: ${{ inputs.base-dir }}
    run: |
      $GITHUB_ACTION_PATH/compose-args.bash

  - name: Run reuse
    shell: bash
    run: |
      source "$Venv_Path/activate"
      reuse $Arguments
    env:
      Arguments: ${{ steps.args.outputs.args }}
      Venv_Path: ${{ steps.venv.outputs.path }}
